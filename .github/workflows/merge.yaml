name: Merge
run-name: Merge ${{ github.ref_name }} - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services have changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      cli: ${{ steps.filter.outputs.cli }}
      helm: ${{ steps.filter.outputs.helm }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflow:
              - '.github/workflows/merge.yaml'
            docker:
              - 'services/api/**'
              - 'clients/web/**'
            cli:
              - 'clients/cli/**'
            helm:
              - 'deploy/helm/**'

  # ---------------------------------------------------------------------------
  # Docker images — multi-arch build & publish
  # ---------------------------------------------------------------------------
  build:
    name: Publish Docker Images
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      matrix:
        container:
          - name: api
            context: services/api
          - name: web
            context: clients/web
        arch:
          - amd64
          - arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Compute version
        id: vars
        run: echo "version=main-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}:${{ matrix.container.context }}"
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.container.name }}:main-${{ matrix.arch }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.container.name }}:${{ github.sha }}-${{ matrix.arch }}
          build-args: VERSION=${{ steps.vars.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.container.name }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.container.name }}-${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}

  # ---------------------------------------------------------------------------
  # Multi-arch manifests
  # ---------------------------------------------------------------------------
  publish-manifests:
    name: Publish multi-arch manifests
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          set -euo pipefail
          for img in api web; do
            repo="${{ env.REGISTRY }}/${{ github.repository }}/${img}"

            # main tag (multi-arch)
            docker buildx imagetools create -t "${repo}:main" "${repo}:main-amd64" "${repo}:main-arm64"

            # immutable SHA tag (multi-arch)
            docker buildx imagetools create -t "${repo}:${GITHUB_SHA}" "${repo}:${GITHUB_SHA}-amd64" "${repo}:${GITHUB_SHA}-arm64"
          done

  # ---------------------------------------------------------------------------
  # CLI — build & verify
  # ---------------------------------------------------------------------------
  build-cli:
    name: Build CLI
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: clients/cli/go.mod
          cache-dependency-path: clients/cli/go.sum

      - name: Build
        working-directory: clients/cli
        run: CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=main-${GITHUB_SHA::8}" ./...

      - name: Vet
        working-directory: clients/cli
        run: go vet ./...

  # ---------------------------------------------------------------------------
  # Helm chart — lint, package & publish
  # ---------------------------------------------------------------------------
  publish-helm:
    name: Publish Helm Chart
    needs: changes
    if: needs.changes.outputs.helm == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Lint chart
        run: helm lint deploy/helm/vincenty --strict

      - name: Package chart
        run: |
          sed -i "s/^version:.*/version: 0.0.0-main+${GITHUB_SHA::8}/" deploy/helm/vincenty/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"main-${GITHUB_SHA::8}\"/" deploy/helm/vincenty/Chart.yaml
          helm package deploy/helm/vincenty --destination .helm-packages

      - name: Push chart to GHCR
        run: |
          for pkg in .helm-packages/*.tgz; do
            helm push "$pkg" oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
          done
