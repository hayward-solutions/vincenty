# WARNING: Replace placeholder values before applying.
# In production, use sealed-secrets, external-secrets-operator,
# or a secrets management solution (Vault, AWS Secrets Manager, etc.)
# rather than committing secrets to version control.
apiVersion: v1
kind: Secret
metadata:
  name: sitaware-secrets
  namespace: sitaware
type: Opaque
stringData:
  ADMIN_USERNAME: admin
  ADMIN_PASSWORD: CHANGE_ME
  ADMIN_EMAIL: admin@sitaware.local
  JWT_SECRET: CHANGE_ME_TO_A_RANDOM_SECRET
  DB_USER: sitaware
  DB_PASSWORD: CHANGE_ME
  REDIS_PASSWORD: CHANGE_ME
  S3_ACCESS_KEY: CHANGE_ME
  S3_SECRET_KEY: CHANGE_ME
  CORS_ALLOWED_ORIGINS: "https://sitaware.example.com"
  TURN_PASSWORD: CHANGE_ME
