apiVersion: v1
kind: ConfigMap
metadata:
  name: sitaware-config
  namespace: sitaware
data:
  # Server
  API_HOST: "0.0.0.0"
  API_PORT: "8080"
  API_LOG_LEVEL: "info"

  # Database
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: sitaware
  DB_SSLMODE: disable

  # Redis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_TLS: "false"

  # S3
  S3_BUCKET: sitaware
  S3_REGION: us-east-1
  S3_USE_PATH_STYLE: "false"

  # WebSocket
  WS_LOCATION_THROTTLE: "1s"

  # JWT TTLs
  JWT_ACCESS_TOKEN_TTL: "15m"
  JWT_REFRESH_TOKEN_TTL: "168h"

  # Security
  RATE_LIMIT_RPS: "10"
  RATE_LIMIT_BURST: "20"
  MAX_REQUEST_BODY_BYTES: "10485760"
  TOKEN_CLEANUP_INTERVAL: "1h"

  # Map defaults
  MAP_DEFAULT_TILE_URL: "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
  MAP_DEFAULT_CENTER_LAT: "0"
  MAP_DEFAULT_CENTER_LNG: "0"
  MAP_DEFAULT_ZOOM: "2"
