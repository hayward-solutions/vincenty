# coturn TURN/STUN server configuration for SitAware
# https://github.com/coturn/coturn

# Realm — must match the domain or a logical namespace
realm=sitaware

# Listening ports
listening-port=3478
tls-listening-port=5349

# Relay port range (for media relay)
min-port=49152
max-port=65535

# Authentication
# Use long-term credential mechanism (required for WebRTC)
lt-cred-mech
user=sitaware:${TURN_PASSWORD:-changeme}

# Disable CLI (not needed in container deployments)
no-cli

# Disable old TLS versions
no-tlsv1
no-tlsv1_1

# Fingerprinting (required for WebRTC STUN)
fingerprint

# Log to stdout (for Docker log collection)
log-file=stdout
verbose
