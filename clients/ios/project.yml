name: Vincenty
options:
  bundleIdPrefix: solutions.hayward
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  fileTypes:
    icon:
      file: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
    INFOPLIST_FILE: Vincenty/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Vincenty/Resources/Vincenty.entitlements
    PRODUCT_BUNDLE_IDENTIFIER: solutions.hayward.vincentyapp
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.9.0"

targets:
  Vincenty:
    type: application
    platform: iOS
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    sources:
      - path: Vincenty
        excludes:
          - Resources/Info.plist
          - Resources/AppIcon.icon
      - path: Vincenty/Resources/AppIcon.icon
        type: file
        buildPhase: resources
    dependencies:
      - package: MapLibre
        product: MapLibre
      - target: VincentyWidgets
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Vincenty/Resources/Info.plist
    scheme:
      testTargets:
        - VincentyTests
        - VincentyUITests
      gatherCoverageData: true

  VincentyWidgets:
    type: app-extension
    platform: iOS
    sources:
      # Widget extension source files
      - path: VincentyWidgets
      # Share ActivityAttributes with the main app target
      - path: Vincenty/Core/Notifications/ConnectionActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: solutions.hayward.vincentyapp.widgets
        INFOPLIST_FILE: VincentyWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: VincentyWidgets/VincentyWidgets.entitlements
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES

  VincentyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VincentyTests
    dependencies:
      - target: Vincenty

  VincentyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VincentyUITests
    dependencies:
      - target: Vincenty
