name: SitAware
options:
  bundleIdPrefix: com.sitaware
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
    INFOPLIST_FILE: SitAware/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: SitAware/Resources/SitAware.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PRODUCT_BUNDLE_IDENTIFIER: com.sitaware.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.9.0"

targets:
  SitAware:
    type: application
    platform: iOS
    sources:
      - path: SitAware
        excludes:
          - Resources/Info.plist
    resources:
      - path: SitAware/Resources/Assets.xcassets
    dependencies:
      - package: MapLibre
        product: MapLibre
    settings:
      base:
        INFOPLIST_FILE: SitAware/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SitAware/Resources/SitAware.entitlements

  SitAwareTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SitAwareTests
    dependencies:
      - target: SitAware

  SitAwareUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SitAwareUITests
    dependencies:
      - target: SitAware
