name: Vincenty
options:
  bundleIdPrefix: com.vincenty
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
    INFOPLIST_FILE: Vincenty/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Vincenty/Resources/Vincenty.entitlements
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PRODUCT_BUNDLE_IDENTIFIER: com.vincenty.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.9.0"

targets:
  Vincenty:
    type: application
    platform: iOS
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    sources:
      - path: Vincenty
        excludes:
          - Resources/Info.plist
    resources:
      - path: Vincenty/Resources/Assets.xcassets
    dependencies:
      - package: MapLibre
        product: MapLibre
      - target: VincentyWidgets
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Vincenty/Resources/Info.plist

  VincentyWidgets:
    type: app-extension
    platform: iOS
    sources:
      # Widget extension source files
      - path: VincentyWidgets
      # Share ActivityAttributes with the main app target
      - path: Vincenty/Core/Notifications/ConnectionActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vincenty.app.widgets
        INFOPLIST_FILE: VincentyWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: VincentyWidgets/VincentyWidgets.entitlements
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES

  VincentyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VincentyTests
    dependencies:
      - target: Vincenty

  VincentyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VincentyUITests
    dependencies:
      - target: Vincenty
