services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${DB_USER:-vincenty}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vincenty}
      POSTGRES_DB: ${DB_NAME:-vincenty}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vincenty} -d ${DB_NAME:-vincenty}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-vincenty}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-vincenty123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Automatically create the default bucket on startup
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set sa http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb sa/${S3_BUCKET:-vincenty} --ignore-existing;
        exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-vincenty}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-vincenty123}

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    healthcheck:
      test: ["CMD", "/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: ./clients/web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:${API_PORT:-8080}
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8080}
      - WS_URL=ws://localhost:${API_PORT:-8080}
      - API_INTERNAL_URL=http://api:${API_PORT:-8080}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      - api

  cli-route:
    build:
      context: ./clients/cli
      dockerfile: Dockerfile
    environment:
      - VINCENTY_SERVER=http://api:${API_PORT:-8080}
      - VINCENTY_USERNAME=${ADMIN_USERNAME}
      - VINCENTY_PASSWORD=${ADMIN_PASSWORD}
      - VINCENTY_DEVICE_NAME=Round Britain
      - VINCENTY_FILE=/data/route.gpx
    volumes:
      - .gpx:/data
    depends_on:
      api:
        condition: service_healthy

  cli-routeburn:
    build:
      context: ./clients/cli
      dockerfile: Dockerfile
    environment:
      - VINCENTY_SERVER=http://api:${API_PORT:-8080}
      - VINCENTY_USERNAME=${ADMIN_USERNAME}
      - VINCENTY_PASSWORD=${ADMIN_PASSWORD}
      - VINCENTY_DEVICE_NAME=Routeburn
      - VINCENTY_FILE=/data/Routeburn.gpx
    volumes:
      - .gpx:/data
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
