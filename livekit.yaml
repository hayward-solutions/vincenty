# LiveKit server configuration for development.
# In production, mount a separate config or use environment variables.

port: 7880

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50060
  use_external_ip: false

redis:
  address: redis:6379

keys:
  devkey: secret0123456789

room:
  empty_timeout: 300
  max_participants: 50

logging:
  level: info

turn:
  enabled: false
