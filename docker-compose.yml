services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${DB_USER:-sitaware}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sitaware}
      POSTGRES_DB: ${DB_NAME:-sitaware}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sitaware} -d ${DB_NAME:-sitaware}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sitaware}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-sitaware123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Automatically create the default bucket on startup
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set sa http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb sa/${S3_BUCKET:-sitaware} --ignore-existing;
        exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sitaware}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-sitaware123}

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    healthcheck:
      test: ["CMD", "/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    build:
      context: ./clients/web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:${API_PORT:-8080}
        NEXT_PUBLIC_WS_URL: ws://localhost:${API_PORT:-8080}
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8080}
      - NEXT_PUBLIC_WS_URL=ws://localhost:${API_PORT:-8080}
      - API_INTERNAL_URL=http://api:${API_PORT:-8080}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  miniodata:
