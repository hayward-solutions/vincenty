services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${DB_USER:-sitaware}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sitaware}
      POSTGRES_DB: ${DB_NAME:-sitaware}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sitaware} -d ${DB_NAME:-sitaware}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sitaware}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-sitaware123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Automatically create the default bucket on startup
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set sa http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb sa/${S3_BUCKET:-sitaware} --ignore-existing;
        exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sitaware}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-sitaware123}

  # ---------------------------------------------------------------------------
  # LiveKit (real-time media)
  # ---------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50060:50000-50060/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7880"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit-egress:
    image: livekit/egress:latest
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY:-devkey}
        api_secret: ${LIVEKIT_API_SECRET:-secret0123456789}
        ws_url: ws://livekit:7880
        redis:
          address: redis:${REDIS_PORT:-6379}
        storage:
          s3:
            access_key: ${S3_ACCESS_KEY:-sitaware}
            secret: ${S3_SECRET_KEY:-sitaware123}
            region: ${S3_REGION:-us-east-1}
            endpoint: http://minio:9000
            bucket: ${S3_BUCKET:-sitaware}
            force_path_style: true
    depends_on:
      livekit:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  livekit-ingress:
    image: livekit/ingress:latest
    ports:
      - "1935:1935"
      - "8085:8080"
    environment:
      INGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY:-devkey}
        api_secret: ${LIVEKIT_API_SECRET:-secret0123456789}
        ws_url: ws://livekit:7880
        redis:
          address: redis:${REDIS_PORT:-6379}
        rtmp_port: 1935
        http_relay_port: 9090
    depends_on:
      livekit:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "${API_PORT:-8080}:${API_PORT:-8080}"
    healthcheck:
      test: ["CMD", "/server", "healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      livekit:
        condition: service_healthy

  web:
    build:
      context: ./clients/web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: http://api:${API_PORT:-8080}
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8080}
      - WS_URL=ws://localhost:${API_PORT:-8080}
      - API_INTERNAL_URL=http://api:${API_PORT:-8080}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      - api

  cli-route:
    build:
      context: ./clients/cli
      dockerfile: Dockerfile
    environment:
      - SITAWARE_SERVER=http://api:${API_PORT:-8080}
      - SITAWARE_USERNAME=${ADMIN_USERNAME}
      - SITAWARE_PASSWORD=${ADMIN_PASSWORD}
      - SITAWARE_DEVICE_NAME=Round Britain
      - SITAWARE_FILE=/data/route.gpx
    volumes:
      - .gpx:/data
    depends_on:
      api:
        condition: service_healthy

  cli-routeburn:
    build:
      context: ./clients/cli
      dockerfile: Dockerfile
    environment:
      - SITAWARE_SERVER=http://api:${API_PORT:-8080}
      - SITAWARE_USERNAME=${ADMIN_USERNAME}
      - SITAWARE_PASSWORD=${ADMIN_PASSWORD}
      - SITAWARE_DEVICE_NAME=Routeburn
      - SITAWARE_FILE=/data/Routeburn.gpx
    volumes:
      - .gpx:/data
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
